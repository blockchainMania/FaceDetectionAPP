services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jarvis_db
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis_dev_password
    ports:
      - "5433:5432"
    volumes:
      - jarvis_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jarvis_pgdata:
